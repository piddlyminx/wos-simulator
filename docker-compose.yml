# docker compose for the WOS simulator dashboard.
#
# Services:
#   - app:         Next.js dev server (Turbopack) with live reload. The host's
#                  dashboard/web/ directory is bind-mounted into the container
#                  so source edits are picked up without any image rebuild.
#                  /app/node_modules and /app/.next are named-volume overlays
#                  so the container-built native modules (better-sqlite3) and
#                  Turbopack cache don't fight the host filesystem.
#
# See docker-compose.env.example for optional local settings.

services:
  app:
    build:
      context: .
      dockerfile: dashboard/web/Dockerfile
    image: wos-simulator-dashboard:dev
    restart: unless-stopped
    # The entrypoint repairs named-volume ownership, then drops to the node user
    # (uid 1000) so bind-mounted outputs remain writable from the WSL shell.
    environment:
      NODE_ENV: development
      DB_PATH: /data/test_results/dashboard.sqlite
      SIM_RUNS_DIR: /data/simulations
      STAT_PRESETS_FILE: /data/stat-presets/player-stat-presets.json
      # Next 15.5+ Turbopack polling watcher. Needed on WSL2/SMB/NFS-backed
      # mounts where native inotify can miss host-side edits.
      NEXT_WATCH_POLL_INTERVAL_MS: ${NEXT_WATCH_POLL_INTERVAL_MS:-1000}
      # Kept for webpack/chokidar fallback tools; Turbopack uses the option above.
      WATCHPACK_POLLING: ${WATCHPACK_POLLING:-true}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
    volumes:
      # Live bind mount of the source tree. Edits on disk -> Turbopack hot
      # reload in the container.
      - ./dashboard/web:/app
      # Named-volume overlays: keep container-built node_modules and the
      # Turbopack/Next cache out of the host tree.
      - wos_node_modules:/app/node_modules
      - wos_next_cache:/app/.next
      # Host-backed simulation stores. Point these at an sshfs/shared mount in
      # the ignored root .env when you want Docker dev and host dev to share
      # the same saved runs and stat presets.
      - ${SIM_RUNS_DIR:-./tmp/simulate-runs}:/data/simulations
      - ${STAT_PRESETS_DIR:-./tmp/stat-presets}:/data/stat-presets
      # Read-write DB mount (required for -shm / -wal siblings).
      - ./test_results:/data/test_results:rw
      # The dashboard's "Import report" route spawns dashboard/ocr_report.py
      # inside the container (REPO_ROOT = cwd/../.. = /). Mount the host
      # dashboard/ tree read-only at /dashboard so the route can reach it.
      # The parser delegates to the imported agent skill under /skill.
      - ./dashboard:/dashboard:ro
      - ./skill:/skill:ro
      # The /api/simulate route spawns dashboard/simulate_battle.py, which
      # computes _REPO_ROOT = dirname(dirname(__file__)) = "/" and imports
      # Base_classes / reads assets + fighters_data relative to that root.
      # Mount the host simulator source tree read-only at the matching paths.
      - ./Base_classes:/Base_classes:ro
      - ./assets:/assets:ro
      # fighters_data is NOT mounted :ro because JsonUtil.load_fighters_data
      # opens these files with 'r+' (it only reads, but the fd demands write
      # access). The simulator does not actually write here, so the host
      # files stay unchanged in practice.
      - ./fighters_data:/fighters_data
      # The "Check now" button spawns check_testcases.py via dashboard/check_now.py.
      # In the container, REPO_ROOT resolves to / (cwd==/app, ../.. == /), so
      # check_testcases.py and its dependencies must be accessible at those paths.
      - ./check_testcases.py:/check_testcases.py:ro
      - ./testcases:/testcases:ro
      # Also mount test_results at / so check_testcases.py can write run JSON
      # and ingest.py can find dashboard.sqlite (both use relative path
      # test_results/ from REPO_ROOT=/). The /data/test_results mount remains
      # for the Next.js server's DB_PATH env var.
      - ./test_results:/test_results:rw
    expose:
      - "3000"
    # Optional local access without going through the tunnel.
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  wos_node_modules:
  wos_next_cache:
