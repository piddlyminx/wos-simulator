# docker compose for the WOS simulator dashboard.
#
# Services:
#   - app:         Next.js dev server (Turbopack) with live reload. The host's
#                  dashboard/web/ directory is bind-mounted into the container
#                  so source edits are picked up without any image rebuild.
#                  /app/node_modules and /app/.next are named-volume overlays
#                  so the container-built native modules (better-sqlite3) and
#                  Turbopack cache don't fight the host filesystem.
#   - cloudflared: Cloudflare Tunnel sidecar, authenticated via a
#                  remotely-managed Tunnel token. Hostname + service routing
#                  are configured once in the Cloudflare Zero Trust dashboard.
#
# See docker-compose.env.example for setup steps.

services:
  app:
    build:
      context: ./dashboard/web
      dockerfile: Dockerfile
    image: wos-simulator-dashboard:dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DB_PATH: /data/test_results/dashboard.sqlite
      # Polling watchers — needed on WSL2/SMB/NFS-backed mounts, harmless on
      # native Linux. Override to false in .env if inotify works natively.
      WATCHPACK_POLLING: ${WATCHPACK_POLLING:-true}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
    volumes:
      # Live bind mount of the source tree. Edits on disk → Turbopack hot
      # reload in the container.
      - ./dashboard/web:/app
      # Named-volume overlays: keep container-built node_modules and the
      # Turbopack/Next cache out of the host tree.
      - wos_node_modules:/app/node_modules
      - wos_next_cache:/app/.next
      # Read-only DB mount (incl. -shm / -wal siblings).
      - ./test_results:/data/test_results:ro
    expose:
      - "3000"
    # Optional local access without going through the tunnel.
    ports:
      - "${APP_PORT:-3000}:3000"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      - app
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:?set TUNNEL_TOKEN in .env (see docker-compose.env.example)}
    command:
      - tunnel
      - --no-autoupdate
      - --loglevel
      - info
      - run

volumes:
  wos_node_modules:
  wos_next_cache:
