# docker compose for the WOS simulator dashboard.
#
# Services:
#   - app:         Next.js dashboard (better-sqlite3, read-only DB mount).
#   - cloudflared: Cloudflare Tunnel sidecar, authenticated via a
#                  remotely-managed Tunnel token. Hostname + service routing
#                  are configured once in the Cloudflare Zero Trust dashboard
#                  when the tunnel is created. No host-side cloudflared files
#                  are read or edited.
#
# See docker-compose.env.example for setup steps.

services:
  app:
    build:
      context: ./dashboard/web
      dockerfile: Dockerfile
    image: wos-simulator-dashboard:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_PATH: /data/test_results/dashboard.sqlite
    volumes:
      # Mount the full test_results dir so better-sqlite3 can open the
      # main DB file together with its -shm / -wal siblings.
      - ./test_results:/data/test_results:ro
    expose:
      - "3000"
    # Optional local access without going through the tunnel.
    ports:
      - "${APP_PORT:-3000}:3000"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      - app
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:?set TUNNEL_TOKEN in .env (see docker-compose.env.example)}
    command:
      - tunnel
      - --no-autoupdate
      - --loglevel
      - info
      - run
